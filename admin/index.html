<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Create Link</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #cbd5e1;
      --accent: #0369a1;
      --danger: #b91c1c;
      --success: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 10%, #dbeafe 0%, transparent 40%),
        radial-gradient(circle at 100% 90%, #ccfbf1 0%, transparent 38%),
        var(--bg);
    }
    main {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 20px 44px rgba(2, 132, 199, 0.12);
      padding: 24px;
    }
    h1 { margin: 0; font-size: 1.6rem; }
    .lead { margin: 8px 0 0; color: var(--muted); }
    form { margin-top: 20px; display: grid; gap: 14px; }
    .grid { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }
    label { display: grid; gap: 6px; font-weight: 700; }
    input {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }
    .hint { margin: 0; color: var(--muted); font-weight: 400; font-size: 0.86rem; }
    .actions { display: flex; gap: 12px; align-items: center; }
    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button[disabled] { opacity: 0.6; cursor: wait; }
    .msg { margin-top: 14px; padding: 10px 12px; border-radius: 10px; font-weight: 700; display: none; }
    .msg.show { display: block; }
    .msg.error { color: var(--danger); background: #fee2e2; border: 1px solid #fecaca; }
    .msg.success { color: var(--success); background: #ccfbf1; border: 1px solid #99f6e4; }
    .result { margin-top: 10px; display: none; }
    .result.show { display: block; }
    .result a { color: var(--accent); word-break: break-all; }
    code { background: #e2e8f0; border-radius: 6px; padding: 2px 6px; }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .actions { flex-direction: column; align-items: stretch; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Admin tao link trung gian</h1>
    <p class="lead">Form nay goi API Cloudflare Worker de commit thang vao <code>links.json</code> tren GitHub.</p>

    <form id="create-form">
      <div class="grid">
        <label>
          Worker API URL *
          <input id="apiUrl" required type="url" placeholder="https://convert-link-admin-api.xxx.workers.dev/create-link">
        </label>
        <label>
          Admin Key *
          <input id="adminKey" required type="password" placeholder="Nhap key bao mat">
        </label>
      </div>

      <div class="grid">
        <label>
          Slug *
          <input id="slug" required pattern="[a-z0-9-]+" placeholder="tuong-bat-ma">
          <span class="hint">Chi dung chu thuong, so, dau gach ngang.</span>
        </label>
        <label>
          URL anh (og:image) *
          <input id="image" required type="url" placeholder="https://...">
        </label>
      </div>

      <label>
        Target URL (Shopee) *
        <input id="targetUrl" required type="url" placeholder="https://s.shopee.vn/...">
      </label>

      <div class="grid">
        <label>
          Title (optional)
          <input id="title" placeholder="De trong de an title">
        </label>
        <label>
          Description (optional)
          <input id="description" placeholder="De trong de an description">
        </label>
      </div>

      <div class="actions">
        <button id="submitBtn" type="submit">Tao link va commit</button>
        <span id="statusText"></span>
      </div>
    </form>

    <p id="message" class="msg"></p>
    <div id="result" class="result">
      <p>URL moi: <a id="newUrl" target="_blank" rel="noopener"></a></p>
      <p>Commit: <a id="commitUrl" target="_blank" rel="noopener"></a></p>
    </div>
  </main>

  <script>
    const form = document.getElementById('create-form');
    const message = document.getElementById('message');
    const result = document.getElementById('result');
    const newUrl = document.getElementById('newUrl');
    const commitUrl = document.getElementById('commitUrl');
    const submitBtn = document.getElementById('submitBtn');
    const statusText = document.getElementById('statusText');

    function showMessage(text, type) {
      message.textContent = text;
      message.className = `msg show ${type}`;
    }

    function clearResult() {
      result.className = 'result';
      newUrl.textContent = '';
      newUrl.removeAttribute('href');
      commitUrl.textContent = '';
      commitUrl.removeAttribute('href');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearResult();

      submitBtn.disabled = true;
      statusText.textContent = 'Dang gui...';

      const payload = {
        slug: document.getElementById('slug').value,
        image: document.getElementById('image').value,
        targetUrl: document.getElementById('targetUrl').value,
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
      };

      const apiUrl = document.getElementById('apiUrl').value;
      const adminKey = document.getElementById('adminKey').value;

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-key': adminKey,
          },
          body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Request failed');
        }

        showMessage(data.message || 'Thanh cong', 'success');
        if (data.url) {
          newUrl.textContent = data.url;
          newUrl.href = data.url;
        }
        if (data.commitUrl) {
          commitUrl.textContent = data.commitUrl;
          commitUrl.href = data.commitUrl;
        }
        result.className = 'result show';
      } catch (error) {
        showMessage(error.message || 'Co loi xay ra', 'error');
      } finally {
        submitBtn.disabled = false;
        statusText.textContent = '';
      }
    });
  </script>
</body>
</html>
